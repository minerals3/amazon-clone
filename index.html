<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <div class="navbar">
            <div class="navbelt">
                <div class="navlogo border">
                    <div class="logo"></div>
                </div>

                <div class="navaddress border">
                    <div class="pinicon">
                        <div class="t1">Deliver to</div>
                    </div>
                    <div class="text">
                        <i class="fa-solid fa-location-dot"></i>
                        <div class="t2">India</div>
                    </div>
                </div>

                <div class="navsearch">
                    <select class="dropdown">
                        <option>All</option>
                    </select>
                    <input class="search" placeholder="Search Amazon">
                    <div class="search-icon">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                </div>

                <div class="navlang">
                    <select class="dropdown">
                        <option>Lang</option>
                    </select>
                </div>

                <div class="signin border">
                    <span class="navline1">Hello, sign in</span>
                    <span class="navline2">Accounts & Lists</span> 
                </div>

                <div class="returns border">
                    <span class="navline1">Returns</span>
                    <span class="navline2">& Orders</span>
                </div>

                <div class="cart border">
                    <div class="nav-cart-count-container">
                        <span id="nav-cart-count">0</span>
                        <span class="nav-cart-icon nav-sprite"><i class="fa-solid fa-cart-shopping"></i></span>
                    </div>

                    <div class="nav-cart-text-container" >
                        <span aria-hidden="true" class="nav-line-1">  
                        </span>
                        <span aria-hidden="true" class="nav-line-2">
                            Cart
                        <span class="nav-icon nav-arrow"></span>
                        </span>
                    </div>
                </div>
            </div>

            <div class="navmain">
                <div class="navleft">
                    <a class="allmenu border" role="button">
                        <i class="fa-solid fa-bars"></i>
                        <span class="menutext">All</span>
                    </a>
                </div>
                <div class="navfill">
                    <div class="navcontainer">
                        <div class="navshop ">
                            <ul class="nav-ul ">
                                <li class="nav-li ">
                                    <div class="navdiv ">
                                        <a href="#" class="nav-a border">Today's deal</a>
                                    </div>
                                </li>
                                <li class="nav-li">
                                    <div class="navdiv">
                                        <a href="#" class="nav-a border">Prime Video</a>
                                    </div>
                                </li>
                                <li class="nav-li">
                                    <div class="navdiv">
                                        <a href="#" class="nav-a border">Gift cards</a>
                                    </div>
                                </li>
                                <li class="nav-li">
                                    <div class="navdiv">
                                        <a href="#" class="nav-a border">Sell</a>
                                    </div>
                                </li>
                                <li class="nav-li">
                                    <div class="navdiv">
                                        <a href="#" class="nav-a border">Regiestry</a>
                                    </div>
                                </li>
                                <li class="nav-li">
                                    <div class="navdiv">
                                        <a href="#" class="nav-a border">Customer Service</a>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="navright"></div>
            </div>
        </div>
    </header>

    <div class="hero-section">
    
    </div>
</body>

</html>
